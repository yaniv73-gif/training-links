<title>קישורי אימון</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

  header { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 16px 16px 0; position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 14px; }
  header h1 span { color: #c7171a; }

  .cats { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; -ms-overflow-style: none; }
  .cats::-webkit-scrollbar { display: none; }

  .cat-btn {
    flex-shrink: 0;
    border: 1.5px solid #ddd;
    background: #fff;
    color: #555;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cat-btn .count { font-size: 11px; background: #f0f0ea; color: #888; border-radius: 10px; padding: 1px 6px; }
  .cat-btn.active { background: #c7171a; border-color: #c7171a; color: #fff; }
  .cat-btn.active .count { background: rgba(255,255,255,0.25); color: #fff; }

  main { padding: 12px 12px 80px; }

  .section-title { font-size: 12px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px 4px; }

  .card {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #eee;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .card-main {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px 10px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }
  .card-main:active { background: #f9f9f6; }

  .platform-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .platform-icon svg { width: 22px; height: 22px; }
  .pi-fb { background: #e8f0fe; }
  .pi-ig { background: #fce8f3; }
  .pi-yt { background: #fce8e8; }

  .card-body { flex: 1; min-width: 0; }
  .card-title { font-size: 15px; font-weight: 500; color: #1a1a1a; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { font-size: 12px; color: #999; }

  .card-arrow { color: #ccc; flex-shrink: 0; }
  .card-arrow svg { width: 16px; height: 16px; }

  .card-desc-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 16px 12px;
    border-top: 1px solid #f5f5f0;
    margin-top: 2px;
    padding-top: 10px;
  }
  .card-desc-text {
    flex: 1;
    font-size: 13px;
    color: #666;
    line-height: 1.4;
    cursor: pointer;
  }
  .card-desc-text.empty { color: #bbb; font-style: italic; }
  .edit-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: #bbb;
    flex-shrink: 0;
    font-size: 15px;
    line-height: 1;
  }
  .edit-btn:active { color: #c7171a; }

  .empty { text-align: center; padding: 60px 20px; color: #bbb; font-size: 15px; }

  .footer-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid #eee;
    padding: 10px 16px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #aaa;
  }
  .search-bar { position: relative; }
  .search-bar input {
    width: 100%;
    background: #f5f5f0;
    border: none;
    border-radius: 10px;
    padding: 8px 12px 8px 36px;
    font-size: 14px;
    font-family: inherit;
    color: #1a1a1a;
    outline: none;
    direction: rtl;
  }
  .search-bar .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #bbb; pointer-events: none; }
  .search-bar .search-icon svg { width: 16px; height: 16px; }
  .search-row { display: flex; gap: 8px; align-items: center; padding-bottom: 12px; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }
  .modal-sheet {
    background: #fff;
    border-radius: 20px 20px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
    width: 100%;
  }
  .modal-handle { width: 40px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 13px; font-weight: 600; color: #999; margin-bottom: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .modal-textarea {
    width: 100%;
    border: 1.5px solid #e5e5e0;
    border-radius: 10px;
    padding: 12px;
    font-size: 15px;
    font-family: inherit;
    color: #1a1a1a;
    resize: none;
    outline: none;
    direction: rtl;
    min-height: 100px;
    background: #fafaf8;
  }
  .modal-textarea:focus { border-color: #c7171a; }
  .modal-actions { display: flex; gap: 10px; margin-top: 12px; }
  .btn-save {
    flex: 1;
    background: #c7171a;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  .btn-cancel {
    flex: 1;
    background: #f5f5f0;
    color: #555;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
  }
</style>

  <h1>קישורי <span>אימון</span></h1>
  <div class="search-row">
    <div class="search-bar" style="flex:1">
      <span class="search-icon"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
      <input type="search" id="searchInput" placeholder="חיפוש..." oninput="render()">
    </div>
  </div>
  <div class="cats" id="catBar"></div>
</header>

<main id="main"></main>

<div class="footer-bar">
  <span id="countLabel"></span>

</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-sheet">

let activeCat = "הכל";
let editingUrl = "";

function descKey(url) { return "desc_" + url; }
function getDesc(url) { return localStorage.getItem(descKey(url)) || ""; }

function openModal(url, title, e) {
  e.preventDefault();
  e.stopPropagation();
  editingUrl = url;
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalTextarea").value = getDesc(url);
  document.getElementById("modalOverlay").classList.add("open");
  setTimeout(() => document.getElementById("modalTextarea").focus(), 100);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById("modalOverlay")) return;
  document.getElementById("modalOverlay").classList.remove("open");
  editingUrl = "";
}

function saveDesc() {
  const val = document.getElementById("modalTextarea").value.trim();
  if (val) localStorage.setItem(descKey(editingUrl), val);
  else localStorage.removeItem(descKey(editingUrl));
  document.getElementById("modalOverlay").classList.remove("open");
  editingUrl = "";
  render();
}

function getCounts() {
  const counts = { "הכל": LINKS.length };
  LINKS.forEach(l => { counts[l.cat] = (counts[l.cat] || 0) + 1; });
  return counts;
}

function render() {

      <span>${c}</span><span class="count">${counts[c]||0}</span>
    </button>`

  let filtered = LINKS.filter(l => {
    const catOk = activeCat === "הכל" || l.cat === activeCat;
    const desc = getDesc(l.url).toLowerCase();
    const qOk = !q || l.title.toLowerCase().includes(q) || l.cat.toLowerCase().includes(q) || l.date.includes(q) || desc.includes(q);
    return catOk && qOk;
  });

  document.getElementById("countLabel").textContent = `${filtered.length} קישורים`;

  const main = document.getElementById("main");
  if (activeCat === "הכל" && !q) {
    const byCat = {};
    CATS_ORDER.slice(1).forEach(c => byCat[c] = []);
    filtered.forEach(l => byCat[l.cat] && byCat[l.cat].push(l));
    main.innerHTML = CATS_ORDER.slice(1).filter(c => byCat[c] && byCat[c].length).map(c =>
      `<div class="section-title">${c} (${byCat[c].length})</div>` +
      byCat[c].map(l => cardHTML(l)).join("")
    ).join("");
  } else {
    main.innerHTML = filtered.length ? filtered.map(l => cardHTML(l)).join("") : `<div class="empty">לא נמצאו קישורים</div>`;
  }
}

function cardHTML(l) {
  const desc = getDesc(l.url);
  const escapedTitle = l.title.replace(/'/g, "\\'");
  const escapedUrl = l.url.replace(/'/g, "\\'");
  return `<div class="card">
    <a class="card-main" href="${l.url}" target="_blank" rel="noopener">
      <div class="platform-icon pi-${l.platform}">${PLATFORM_SVG[l.platform]}</div>
      <div class="card-body">
        <div class="card-title">${l.title}</div>
        <div class="card-meta">${l.date}</div>
      </div>
      <div class="card-arrow"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg></div>
    </a>
    <div class="card-desc-row">
      <div class="card-desc-text ${desc ? "" : "empty"}" onclick="openModal('${escapedUrl}','${escapedTitle}',event)">
        ${desc || "הוסף תיאור..."}
      </div>
      <button class="edit-btn" onclick="openModal('${escapedUrl}','${escapedTitle}',event)" aria-label="ערוך תיאור">✏️</button>
    </div>
  </div>`;
}

function setcat(c) { activeCat = c; render(); }

render();
</script>
</body>
</html>
