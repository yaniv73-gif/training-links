    border: 1.5px solid #ddd;
    background: #fff;
    color: #555;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;

    font-family: inherit;

    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cat-btn .count { font-size: 11px; background: #f0f0ea; color: #888; border-radius: 10px; padding: 1px 6px; }

  main { padding: 12px 12px 80px; }

  .section-title { font-size: 12px; font-weight: 600; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px 4px; display:flex; align-items:center; justify-content:space-between; padding-left:4px; }
  .section-title-text { flex:1; }
  .delete-cat-btn { background:none; border:none; cursor:pointer; color:#ddd; font-size:15px; padding:2px 6px; line-height:1; flex-shrink:0; }
  .delete-cat-btn:active { color:#c7171a; }

  .card {
    background: #fff;
    border-radius: 14px;
    border: 1px solid #eee;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .card-main {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px 10px;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }
  .card-main:active { background: #f9f9f6; }

  .platform-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .platform-icon svg { width: 22px; height: 22px; }
  .pi-fb { background: #e8f0fe; }
  .pi-ig { background: #fce8f3; }
  .pi-yt { background: #fce8e8; }
  .pi-tt { background: #f0f0f0; }
  .pi-other { background: #f5f0eb; }

  .card-body { flex: 1; min-width: 0; }
  .card-title { font-size: 15px; font-weight: 500; color: #1a1a1a; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { font-size: 12px; color: #999; }

  .card-arrow { color: #ccc; flex-shrink: 0; }
  .card-arrow svg { width: 16px; height: 16px; }

  .card-desc-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 12px 8px 16px;
    border-top: 1px solid #f5f5f0;
    padding-top: 6px;
  }
  .card-desc-text {
    flex: 1;
    font-size: 12px;
    color: #888;
    line-height: 1.4;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-desc-text.expanded {
    white-space: normal;
    overflow: visible;
    text-overflow: unset;
  }
  .expand-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 4px;
    color: #bbb;
    flex-shrink: 0;
    font-size: 12px;
    line-height: 1;
    transition: transform 0.2s;
  }
  .expand-btn.expanded { transform: rotate(180deg); }
  .card-btns {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .edit-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 4px;
    color: #ccc;
    flex-shrink: 0;
    font-size: 13px;
    line-height: 1;
  }
  .edit-btn:active { color: #c7171a; }
  .delete-btn { background:none; border:none; cursor:pointer; padding:2px 4px; color:#ddd; flex-shrink:0; font-size:14px; line-height:1; }
  .delete-btn:active { color:#c7171a; }
  .card-row { display:flex; align-items:stretch; }
  .card-row .card-main { flex:1; min-width:0; }
  .drag-handle { display:flex; align-items:center; padding:0 12px 0 8px; color:#d0d0d0; cursor:grab; touch-action:none; flex-shrink:0; }
  .drag-handle:active { color:#999; cursor:grabbing; }
  .drag-over { outline:2px solid #c7171a !important; outline-offset:2px; border-radius:14px; }
  .drag-ghost { pointer-events:none; position:fixed; z-index:1000; opacity:0.92; box-shadow:0 8px 32px rgba(0,0,0,0.22); border-radius:14px; background:#fff; transition:none; }
  .has-desc-dot {
    width: 6px; height: 6px;
    background: #c7171a;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
    vertical-align: middle;
    flex-shrink: 0;
  }

  .empty { text-align: center; padding: 60px 20px; color: #bbb; font-size: 15px; }

  .footer-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid #eee;
    padding: 10px 16px;
    padding-bottom: calc(10px + env(safe-area-inset-bottom));
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #aaa;

  .search-bar { position: relative; }

    border-radius: 10px;

    font-family: inherit;
    color: #1a1a1a;
    outline: none;
    direction: rtl;

    position: fixed;

    background: rgba(0,0,0,0.4);
    z-index: 200;
    align-items: flex-end;

  .modal-sheet {

    border-radius: 20px 20px 0 0;

    width: 100%;

    border-radius: 10px;
    padding: 12px;

    font-family: inherit;
    color: #1a1a1a;

    outline: none;
    direction: rtl;
    min-height: 100px;
    background: #fafaf8;

  .modal-actions { display: flex; gap: 10px; margin-top: 12px; }

<header>

    <button id="syncBtn" onclick="runSync()" style="display:flex;align-items:center;gap:6px;background:#c7171a;color:#fff;border:none;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">

</header>

<main id="main"></main>

  <span>FightLab.co.il</span>
</div>

    <div class="modal-actions">
      <button class="btn-save" onclick="saveDesc()">שמור</button>

    </div>
  </div>
</div>

function getOrderedLinks() {

  const seen = new Set(customOrder);
  visible.forEach(l => { if (!seen.has(l.url)) inOrder.unshift(l); });

}

// --- Drag (touch + mouse) ---
let drag = null;

function dragBegin(clientX, clientY, cardEl, url) {
  const rect = cardEl.getBoundingClientRect();
  const ghost = cardEl.cloneNode(true);
  ghost.className = "card drag-ghost";
  ghost.style.left  = rect.left + "px";
  ghost.style.top   = rect.top  + "px";
  ghost.style.width = rect.width + "px";
  document.body.appendChild(ghost);
  cardEl.style.opacity = "0.25";
  drag = { url, card: cardEl, ghost, offsetY: clientY - rect.top, offsetX: clientX - rect.left };
}

function dragMove(clientX, clientY) {
  if (!drag) return;
  drag.ghost.style.top  = (clientY - drag.offsetY) + "px";
  drag.ghost.style.left = (clientX - drag.offsetX) + "px";
  drag.ghost.style.visibility = "hidden";
  const el = document.elementFromPoint(clientX, clientY);
  drag.ghost.style.visibility = "";
  document.querySelectorAll(".drag-over").forEach(x => x.classList.remove("drag-over"));
  const tc = el && el.closest(".card");
  const ts = el && el.closest(".section-title");
  if (tc && tc !== drag.card) { tc.classList.add("drag-over"); drag.dropCard = tc.dataset.url; drag.dropCat = null; }
  else if (ts)                { ts.classList.add("drag-over"); drag.dropCat = ts.dataset.cat;  drag.dropCard = null; }
  else                        { drag.dropCard = null; drag.dropCat = null; }
}

let reloadTimer = null;
function scheduleReload() {
  clearTimeout(reloadTimer);
  reloadTimer = setTimeout(() => window.location.reload(), 60000);
  showToast && showToast("יעודכן בעוד דקה...", "#555");
}

function dragCommit() {
  if (!drag) return;
  document.querySelectorAll(".drag-over").forEach(x => x.classList.remove("drag-over"));
  drag.ghost.remove();
  drag.card.style.opacity = "";
  const changed = !!(drag.dropCard || drag.dropCat);
  if (drag.dropCard) {
    const all = getOrderedLinks();
    const fi = all.findIndex(l => l.url === drag.url);
    const ti = all.findIndex(l => l.url === drag.dropCard);
    if (fi !== -1 && ti !== -1 && fi !== ti) { const [m] = all.splice(fi, 1); all.splice(ti, 0, m); saveOrder(all); }
    render();
  } else if (drag.dropCat) {
    const prevCat = getLinkCat(LINKS.find(l => l.url === drag.url) || {});
    customCats[drag.url] = drag.dropCat;
    saveCats();
    lastDeleted = { type: "catMove", url: drag.url, prevCat };
    render();
    showUndoToast("הועבר ל" + drag.dropCat);
  }
  drag = null;
  if (changed) scheduleReload();
}

// Touch handlers
function onTouchStart(e, cardEl, url) {
  e.preventDefault();
  dragBegin(e.touches[0].clientX, e.touches[0].clientY, cardEl, url);
  document.addEventListener("touchmove", onTouchMove, { passive: false });
  document.addEventListener("touchend",  onTouchEnd,  { once: true });
}
function onTouchMove(e) { e.preventDefault(); dragMove(e.touches[0].clientX, e.touches[0].clientY); }
function onTouchEnd()   { document.removeEventListener("touchmove", onTouchMove); dragCommit(); }

// Mouse handlers
function onMouseDown(e, cardEl, url) {
  e.preventDefault();
  dragBegin(e.clientX, e.clientY, cardEl, url);
  document.addEventListener("mousemove", onMouseMove);
  document.addEventListener("mouseup",   onMouseUp, { once: true });
}
function onMouseMove(e) { dragMove(e.clientX, e.clientY); }
function onMouseUp()    { document.removeEventListener("mousemove", onMouseMove); dragCommit(); }

function saveDeletedState() {
  localStorage.setItem("deletedUrls", JSON.stringify([...deletedUrls]));
}

function deleteLink(url, e) {
  e.preventDefault();
  e.stopPropagation();
  deletedUrls.add(url);
  lastDeleted = { type: "url", url };
  saveDeletedState();
  render();
  showUndoToast("קישור נמחק");
}

function deleteCat(cat, e) {
  e.preventDefault();
  e.stopPropagation();
  const urls = LINKS.filter(l => l.cat === cat && !deletedUrls.has(l.url)).map(l => l.url);
  if (!urls.length) return;
  if (!confirm(`למחוק את כל ${urls.length} הקישורים של ${cat}?`)) return;
  urls.forEach(u => deletedUrls.add(u));
  lastDeleted = { type: "cat", cat, urls };
  saveDeletedState();
  activeCat = "הכל";
  render();
  showUndoToast(`${cat} נמחק (${urls.length})`);
}

function undoDelete() {
  if (!lastDeleted) return;
  if (lastDeleted.type === "catMove") {
    const orig = LINKS.find(l => l.url === lastDeleted.url);
    if (orig && lastDeleted.prevCat === orig.cat) delete customCats[lastDeleted.url];
    else customCats[lastDeleted.url] = lastDeleted.prevCat;
    saveCats();
  } else {
    lastDeleted.urls
      ? lastDeleted.urls.forEach(u => deletedUrls.delete(u))
      : deletedUrls.delete(lastDeleted.url);
    saveDeletedState();
  }
  lastDeleted = null;
  render();
  const t = document.getElementById("toast");
  if (t) t.style.opacity = "0";
}

function showUndoToast(msg) {
  let t = document.getElementById("toast");
  if (!t) {
    t = document.createElement("div");
    t.id = "toast";
    t.style.cssText = "position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;transition:opacity 0.3s;white-space:nowrap;display:flex;gap:14px;align-items:center";
    document.body.appendChild(t);
  }
  t.innerHTML = `<span>${msg}</span><button onclick="undoDelete()" style="background:none;border:none;color:#f88;font-weight:700;font-size:13px;cursor:pointer;padding:0;font-family:inherit">בטל</button>`;
  t.style.opacity = "1";
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity = "0"; lastDeleted = null; }, 5000);
}

function showToast(msg, color) {
  let t = document.getElementById("toast");
  if (!t) {
    t = document.createElement("div");
    t.id = "toast";
    t.style.cssText = "position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;transition:opacity 0.3s;white-space:nowrap";
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.background = color || "#333";
  t.style.opacity = "1";
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = "0", 3000);
}

function getDesc(l) { return localStorage.getItem(descKey(l.url)) || l.desc || ""; }

function openModal(url, title, e) {

  document.getElementById("modalOverlay").classList.add("open");

function closeModal(e) {

}

function saveDesc() {
  const val = document.getElementById("modalTextarea").value.trim();
  if (val) localStorage.setItem(descKey(editingUrl), val);
  else localStorage.removeItem(descKey(editingUrl));
  document.getElementById("modalOverlay").classList.remove("open");
  editingUrl = "";
  render();
}

function getCounts() {
  const visible = getOrderedLinks();
  const counts = { "הכל": visible.length };
  visible.forEach(l => { const c = getLinkCat(l); counts[c] = (counts[c] || 0) + 1; });
  return counts;
}

function render() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  const counts = getCounts();

  document.getElementById("catBar").innerHTML = CATS_ORDER.filter(c => counts[c]).map(c =>
    `<button class="cat-btn ${activeCat===c?"active":""}" data-cat="${c}">
      <span>${c}</span><span class="count">${counts[c]||0}</span>
    </button>`
  ).join("");

  let filtered = getOrderedLinks().filter(l => {
    const catOk = activeCat === "הכל" || getLinkCat(l) === activeCat;
    const desc = getDesc(l).toLowerCase();
    const qOk = !q || l.title.toLowerCase().includes(q) || getLinkCat(l).toLowerCase().includes(q) || l.date.includes(q) || desc.includes(q);
    return catOk && qOk;
  });

  // Sort newest first when viewing a specific category
  if (activeCat !== "הכל") {
    filtered.sort(function(a,b) {
      function pd(d){var p=d.split('/');return new Date(p[2],p[1]-1,p[0]);}
      return pd(b.date)-pd(a.date);
    });
  }
  document.getElementById("countLabel").textContent = `${filtered.length} קישורים`;

  const main = document.getElementById("main");
  if (activeCat === "הכל" && !q) {
    const byCat = {};
    CATS_ORDER.slice(1).forEach(c => byCat[c] = []);
    filtered.forEach(l => { const c = getLinkCat(l); if (byCat[c]) byCat[c].push(l); else byCat[c] = [l]; });
    const CAT_EMOJI = {
      "תאילנדי":"🥊","שקים":"👊","MMA":"🥋","ילדים":"👦","מוביליטי":"🤸","בעיטות":"🦵","שוטרים":"🛡️","ג'יוג'יטסו":"🤼"
    };
    function parseD(d) { var p=d.split('/'); return new Date(p[2],p[1]-1,p[0]); }
    main.innerHTML = '<div class="dashboard">' +
      CATS_ORDER.slice(1).filter(c => byCat[c] && byCat[c].length).map(c => {
        const ls = byCat[c];
        const latest = ls.reduce((a,b) => parseD(a.date) > parseD(b.date) ? a : b);
        return `<div class="dash-tile" data-cat="${c}">
          <button class="dash-del" data-delcat="${c}" title="מחק קטגוריה">🗑</button>
          <div class="dash-emoji">${CAT_EMOJI[c]||'📌'}</div>
          <div class="dash-name">${c}</div>
          <div class="dash-count">${ls.length} קישורים</div>
          <div class="dash-date">עודכן ${latest.date}</div>
        </div>`;
      }).join('') +
    '</div>';
  } else {
    if (!filtered.length) {
      main.innerHTML = '<div class="empty">לא נמצאו קישורים</div>';
    } else {
      let html = '';
      let lastDate = null;
      filtered.forEach(function(l) {
        if (l.date !== lastDate) {
          html += `<div class="date-divider">${l.date}</div>`;
          lastDate = l.date;
        }
        html += cardHTML(l);
      });
      main.innerHTML = html;
    }
  }
}

        <button class="delete-btn" onclick="deleteLink('${escapedUrl}',event)" aria-label="מחק">🗑</button>
      </div>
      <div class="drag-handle">${dragHandleSVG}</div>
    </div>
    ${descRow}
  </div>`;
}

function setcat(c) { activeCat = c; render(); }

render();

// Event delegation for drag — stable container survives re-renders
document.getElementById("catBar").addEventListener("click", function(e) {
  const btn = e.target.closest(".cat-btn");
  if (btn && btn.dataset.cat) setcat(btn.dataset.cat);
});
const mainEl = document.getElementById("main");
mainEl.addEventListener("touchstart", function(e) {
  const handle = e.target.closest(".drag-handle");
  if (!handle) return;
  const card = handle.closest(".card");
  if (!card || !card.dataset.url) return;
  onTouchStart(e, card, card.dataset.url);
}, { passive: false });
mainEl.addEventListener("mousedown", function(e) {
  const handle = e.target.closest(".drag-handle");
  if (!handle) return;
  const card = handle.closest(".card");
  if (!card || !card.dataset.url) return;
  onMouseDown(e, card, card.dataset.url);
});
mainEl.addEventListener("click", function(e) {
  // Dashboard tile click
  const tile = e.target.closest(".dash-tile");
  if (tile && tile.dataset.cat && !e.target.closest(".dash-del")) {
    setcat(tile.dataset.cat);
    return;
  }
  // Dashboard delete button
  const delBtn = e.target.closest(".dash-del");
  if (delBtn && delBtn.dataset.delcat) {
    deleteCat(delBtn.dataset.delcat, e);
    return;
  }
});
mainEl.addEventListener("click", function(e) {
  const btn = e.target.closest(".edit-btn");
  if (!btn) return;
  e.preventDefault();
  e.stopPropagation();
  const card = btn.closest(".card");
  if (!card) return;
  const url = card.dataset.url;
  const link = LINKS.find(function(l) { return l.url === url; });
  if (!link) return;
  editingUrl = url;
  document.getElementById("modalTitle").textContent = link.title;
  document.getElementById("modalTextarea").value = getDesc(link);
  modalOpenTime = Date.now();
  document.getElementById("modalOverlay").classList.add("open");
  setTimeout(function() { document.getElementById("modalTextarea").focus(); }, 100);
});
</script>
</body>
</html>
